{% extends "core/base.html" %}
{% block full_content %}
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — PaisaCoach</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#080c14;--surface:#0f1623;--border:#1e2d45;--accent:#00e5a0;--text:#e8edf5;--muted:#6b7fa3}
    body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;}
    .bg{position:fixed;inset:0;background:radial-gradient(ellipse 60% 50% at 50% 0%,rgba(0,229,160,0.08),transparent 70%);pointer-events:none;}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:40px;width:420px;max-width:95vw;}
    .logo{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;text-align:center;margin-bottom:8px;}
    .logo span{color:var(--accent);}
    .sub{text-align:center;color:var(--muted);font-size:14px;margin-bottom:32px;}
    .form-group{margin-bottom:18px;}
    .label{display:block;font-size:13px;font-weight:500;color:var(--muted);margin-bottom:6px;}
    .input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:10px;color:var(--text);padding:11px 14px;font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color 0.2s;}
    .input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,229,160,0.1);}
    .btn{width:100%;padding:13px;background:var(--accent);color:#000;border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:all 0.2s;margin-top:8px;}
    .btn:hover{background:#00ffb3;transform:translateY(-1px);}
    .link{text-align:center;font-size:13px;color:var(--muted);margin-top:20px;}
    .link a{color:var(--accent);text-decoration:none;}
    .alert{background:rgba(255,59,85,0.1);border:1px solid rgba(255,59,85,0.2);color:#ff3b55;padding:12px 16px;border-radius:10px;font-size:14px;margin-bottom:16px;}
    .divider{border:none;border-top:1px solid var(--border);margin:24px 0;}
    .demo-btn{width:100%;padding:11px;background:transparent;color:var(--text);border:1px solid var(--border);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer;text-decoration:none;display:block;text-align:center;transition:all 0.2s;}
    .demo-btn:hover{background:rgba(255,255,255,0.04);}
  </style>
</head>
<body>
<div class="bg"></div>
<div class="card">
  <div class="logo">Paisa<span>Coach</span></div>
  <div class="sub">Sign in to your financial copilot</div>
  {% if messages %}{% for m in messages %}<div class="alert">{{ m }}</div>{% endfor %}{% endif %}
  <form method="post">
    {% csrf_token %}
    <div class="form-group">
      <label class="label">Username</label>
      <input name="username" class="input" placeholder="your_username" autocomplete="username" required>
    </div>
    <div class="form-group">
      <label class="label">Password</label>
      <input name="password" type="password" class="input" placeholder="••••••••" autocomplete="current-password" required>
    </div>
    <button type="submit" class="btn">Sign In →</button>
  </form>
  <hr class="divider">
  <form method="post" action="{% url 'load_demo' %}">
    {% csrf_token %}
    <button type="submit" class="demo-btn">▶ Try with Demo Data (no signup)</button>
  </form>
  <div class="link">Don't have an account? <a href="{% url 'register' %}">Create one free</a></div>
</div>
</body></html>
{% endblock %}
